<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>‎ </title>

<link rel="preload" href="../fonts/deathnote_font/DEATH_NOTE1.ttf" as="font" type="font/ttf" crossorigin="anonymous">

<style>
@font-face {
  font-family: 'cloister';
  src: url('../fonts/cloister_black/CloisterBlack.ttf') format('truetype');
  font-display: block;
}
@font-face {
  font-family: 'DeathNote';
  src: url('../fonts/deathnote_font/DEATH_NOTE1.ttf') format('truetype');
  font-display: block;
}
@font-face {
  font-family: 'SpecialElite';
  src: url('../fonts/Special_Elite/SpecialElite-Regular.ttf') format('truetype');
  font-display: block;
}


#cursor-layer {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 9998;
 /* mix-blend-mode: difference; */
  opacity: 0;
  transition: opacity 1000ms linear;
}

#cursor-layer.active {
  opacity: 1;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
*:focus { outline: none !important; }
img { -webkit-user-drag: none; user-select: none; }

::selection { background: #ffffff; color: #000000; }
::-moz-selection { background: #ffffff; color: #000000; }

::-webkit-scrollbar { width: 16px; }
::-webkit-scrollbar-track { background: #080808; border-left: 3px solid #000000; }
::-webkit-scrollbar-thumb {
  background-image: url('../images/scrollbar1.webp');
  background-size: cover; background-position: center; background-repeat: no-repeat;
  border: 1px dashed #000000;
}
::-webkit-scrollbar-thumb:hover {
  background-image: url('../images/scrollbar2.webp');
  background-size: cover; background-position: center; background-repeat: no-repeat;
  filter: brightness(100);
}
::-webkit-scrollbar-corner { background: #111; }

body {
  font-family: 'SpecialElite', Georgia, serif;
  font-size: 13px;
  color: #ffffff;
  background-color: #000;
  background-image: url("../images/backgrounds/sketchbookbg.jpg");
  background-attachment: fixed;
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  justify-content: center;
}

a { color: #ffffff; text-decoration: none; }
a:hover { text-decoration: underline; }

#wrapper { width: 560px; max-width: 100%; }

/* ─── HEADER ─── */
#siteHeader {
  background: #000;
  border-bottom: 2px solid #fff;
  padding: 16px 14px 11px;
}
#siteIcon {
  width: 78px; height: 78px;
  object-fit: contain; object-position: center;
  display: inline-block;
  margin-left: 221px;
}
#siteLogo {
  width: 370px; margin-left: 95px; height: 90px;
  object-position: center; filter: invert();
}

/* ─── NAV ─── */
#siteNav {
  background: #000;
  padding: 6px 12px;
  display: flex; align-items: center; justify-content: center;
  gap: 40px;
  font-family: 'SpecialElite', Georgia, serif;
  font-size: 12px;
}
.nav-sep { color: #444; margin: 0 9px; user-select: none; }
.nav-item {
  color: #ffffff; text-decoration: none; cursor: pointer;
  position: relative; display: inline-block;
  padding: 2px 18px 2px 4px;
}
.nav-item:hover, .nav-item.active {
  color: #000000; background-color: white; text-decoration: underline;
}
.nav-item:hover::after, .nav-item.active::after {
  content: "";
  position: absolute; right: -2px; top: 50%;
  transform: translateY(-50%);
  width: 22px; height: 12px;
  background-image: url('../images/navcross.png');
  background-size: contain; background-repeat: no-repeat; background-position: center;
  pointer-events: none;
}

/* ─── MAIN ─── */
#mainContent {
  position: relative; background: #000; min-height: 400px;
}
#mainContent::before, #mainContent::after {
  content: ""; position: absolute; top: 0; bottom: 0; width: 12px;
  background: url('https://wallpapers.com/images/thumbnail/filigree-samsung-black-9u6vx5ktxvmprgub.webp') repeat-y;
  filter: brightness(3.4);
}
#mainContent::before { left: 0; }
#mainContent::after { right: 0; }

/* ─── SECTION BAR ─── */
.section-bar {
  background: #000000; color: #fff;
  font-family: 'SpecialElite', Georgia, serif;
  font-size: 22px; font-weight: normal;
  padding: 8px 0 5px; display: block; text-align: center;
  border-bottom: 1px solid #e5dada; text-transform: uppercase;
}

/* ─── BLACK GAP ─── */
.black-gap {
  background-image: url('../images/scrollbar1.webp');
  height: 8px;
  border-top: 1px solid #000000; border-bottom: 1px solid #000000;
}

/* ─── INTRO BOX ─── */
.intro-box {
  background: #000000; color: #ffffff;
  padding: 12px 14px 14px;
  border-bottom: 2px solid #ffffff; text-align: center;
}
.intro-box p {
  font-family: 'SpecialElite', Georgia, serif;
  font-size: 13px; line-height: 1.72; color: #ffffff;
}

/* ─── TABS ─── */
.tab-bar {
  display: flex; background: #000; border-bottom: 1px solid #333;
}
.tab-btn {
  flex: 1; background: none;
  border: none; border-right: 1px solid #333;
  color: #ffffff;
  font-family: 'SpecialElite', Georgia, serif;
  font-size: 12px; padding: 7px 0; cursor: pointer;
  text-transform: uppercase; letter-spacing: 1px;
}
.tab-btn:last-child { border-right: none; }
.tab-btn:hover { color: #fff; background: #111; }
.tab-btn.active { color: #000; background: #fff; }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── GALLERY ─── */
.gallery-wrap {
  background: #000;
  padding: 14px 20px 6px;
}
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.gallery-card {
  aspect-ratio: 1 / 1; overflow: hidden;
  border: 1px solid #333; background: #111;
  cursor: zoom-in; position: relative;
}
.gallery-card img {
  width: 100%; height: 100%;
  object-fit: fill; display: block;
}
.gallery-card:hover img { filter: brightness(1.1); }
.gallery-card-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: flex-end;
  padding: 6px 8px; opacity: 0; 
}
.gallery-card:hover .gallery-card-overlay { opacity: 1; }
.gallery-card-title {
  font-family: 'SpecialElite', Georgia, serif;
  font-size: 10px; color: #fff;
  letter-spacing: 0.5px; text-transform: uppercase;
}

/* ─── PAGER ─── */
.pager-row {
  display: flex; justify-content: center; align-items: center;
  gap: 6px; padding: 12px 0 8px;
}
.pager-btn {
  background: #000; border: 1px solid #444; color: #fff;
  font-family: 'SpecialElite', Georgia, serif;
  font-size: 13px; min-width: 28px; height: 28px;
  padding: 0 8px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
}
.pager-btn:hover, .pager-btn.active {
  background: #fff; color: #000; border-color: #fff;
}

/* ─── PAINT ─── */
#paintEmbedWrap { margin-left: 10px ; width: 100%; height: 430px; }
#paintEmbedWrap iframe { width: 96%; height: 100%; border: none; display: block; }

/* ─── LIGHTBOX ─── */
#lightbox {
  display: none; position: fixed; inset: 0; z-index: 99999;
  background: rgba(0,0,0,0.95);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
#lightbox.active { display: flex; }
#lbImgWrap { max-width: 90vw; max-height: 80vh; display: flex; align-items: center; justify-content: center; }
#lbImg { max-width: 100%; max-height: 80vh; object-fit: contain; border: 1px solid #444; display: block; }
#lbTitle {
  font-family: 'SpecialElite', Georgia, serif;
  font-size: 12px; color: #ffffff;
  text-transform: uppercase; letter-spacing: 1px; text-align: center;
}
#lbClose {
  position: fixed; top: 16px; right: 20px;
  background: #000; border: 1px solid #fff; color: #fff;
  font-family: 'SpecialElite', Georgia, serif;
  font-size: 11px; padding: 3px 10px; cursor: pointer; letter-spacing: 1px;
}
#lbClose:hover { background: #fff; color: #000; }
.lbNav {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.7); border: 1px solid #555; color: #fff;
  font-size: 20px; width: 36px; height: 60px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.lbNav:hover { background: #fff; color: #000; }
#lbPrev { left: 12px; }
#lbNext { right: 12px; }

/* ─── FOOTER ─── */
#pageFooter {
  padding: 1px 1px 10px; background: #000;
  border-top: 1px solid #222;
  font-family: 'SpecialElite', Georgia, serif;
  font-size: 11.5px; color: #ffffff; text-align: center;
}
#pageFooter .footer-author { color: #ffffff; cursor: default; border-bottom: 1px dotted #444; }
#pageFooter .footer-author:hover { color: #ccc; border-bottom-style: solid; }

/* ─── RESPONSIVE ─── */
@media (max-width: 700px) {
  body { background-image: none; justify-content: flex-start; }
  #wrapper { width: 100%; }
  #siteIcon { margin-left: 0; display: block; margin: 0 auto 8px; }
  #siteLogo { width: min(100%, 280px); margin: 0 auto; display: block; height: auto; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lbClose" onclick="closeLb()">close</button>

<div id="wrapper">

<canvas id="cursor-layer" aria-hidden="true"></canvas>

<script>
const IMAGES = [
  { src: '../images/sketches/alienmaldito.png',             title: 'alien maldito' },
  { src: '../images/sketches/choppedmyself.png',            title: 'chopped myself' },
  { src: '../images/sketches/coelho1.png',                  title: 'coelho 1' },
  { src: '../images/sketches/coelho2.png',                  title: 'coelho 2' },
  { src: '../images/sketches/coelho3.png',                  title: 'coelho 3' },
  { src: '../images/sketches/coelho4.png',                  title: 'coelho 4' },
  { src: '../images/sketches/coelho5.png',                  title: 'coelho 5' },
  { src: '../images/sketches/dante2.png',                   title: 'dante' },
  { src: '../images/sketches/dante3.png',                   title: 'dante 3' },
  { src: '../images/sketches/demon.png',                    title: 'demon' },
  { src: '../images/sketches/easter.jpg',                   title: 'easter' },
  { src: '../images/sketches/lerolero.png',                 title: 'lero lero' },
  { src: '../images/sketches/mishanshizune.jpg',            title: 'misha & shizune' },
  { src: '../images/sketches/nowyouknowhowitfeelslike.png', title: 'now you know' },
  { src: '../images/sketches/princessunicorn.png',          title: 'princess unicorn' },
  { src: '../images/sketches/rikafurude.png',               title: 'rika furude' },
];

const PER_PAGE = 9;
let currentPage = 0;
let lbIndex = 0;

function renderGallery() {
  const grid  = document.getElementById('galleryGrid');
  const pager = document.getElementById('pagerRow');
  const start = currentPage * PER_PAGE;
  const imgs  = IMAGES.slice(start, start + PER_PAGE);
  const totalPages = Math.ceil(IMAGES.length / PER_PAGE);

  grid.innerHTML = imgs.map((img, i) => `
    <div class="gallery-card" onclick="openLb(${start + i})">
      <img src="${img.src}" alt="${img.title}" loading="lazy">
      <div class="gallery-card-overlay">
        <span class="gallery-card-title">${img.title}</span>
      </div>
    </div>
  `).join('');

  pager.innerHTML = '';
  for (let i = 0; i < totalPages; i++) {
    const btn = document.createElement('button');
    btn.className = 'pager-btn' + (i === currentPage ? ' active' : '');
    btn.textContent = i + 1;
    btn.onclick = () => { currentPage = i; renderGallery(); window.scrollTo({top:0,behavior:'smooth'}); };
    pager.appendChild(btn);
  }
}

function openLb(index) {
  lbIndex = index; updateLb();
  document.getElementById('lightbox').classList.add('active');
  document.addEventListener('keydown', lbKey);
}
function closeLb() {
  document.getElementById('lightbox').classList.remove('active');
  document.removeEventListener('keydown', lbKey);
}
function lbShift(dir) {
  lbIndex = (lbIndex + dir + IMAGES.length) % IMAGES.length;
  updateLb();
}
function updateLb() {
  document.getElementById('lbImg').src = IMAGES[lbIndex].src;
  document.getElementById('lbTitle').textContent = IMAGES[lbIndex].title;
}
function lbKey(e) {
  if (e.key === 'ArrowLeft')  lbShift(-1);
  if (e.key === 'ArrowRight') lbShift(1);
  if (e.key === 'Escape')     closeLb();
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLb();
});

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', ['gallery','paint'][i] === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'paint') initPaint();
}

var paintInited = false;
function initPaint() {
  if (paintInited) return;
  paintInited = true;
  var wrap   = document.getElementById('paintEmbedWrap');
  var iframe = document.createElement('iframe');
  iframe.src = 'https://jspaint.app';
  iframe.setAttribute('allow', 'clipboard-read; clipboard-write; display-capture; fullscreen');
  wrap.appendChild(iframe);
}

renderGallery();


(function() {
  const fullTitle = "Sketchbook - Archive Shinigami";
  let i = 0;

  // ✍️ efeito digitando
  const typing = setInterval(() => {
    document.title = fullTitle.slice(0, i);
    i++;

    if (i > fullTitle.length) {
      clearInterval(typing);
      document.title = fullTitle; // garante título completo
      startBlink();
    }
  }, 120);

  function startBlink() {
    function loop() {

      const delay = 3000 + Math.random() * 800; // ✅ 3s–3.8s

      setTimeout(() => {
        const original = fullTitle; // ✅ usa sempre o correto

        const blinkCount = Math.random() < 0.5 ? 1 : 2;
        let done = 0;

        function doBlink() {
          let j = 0;

          const blink = setInterval(() => {
            document.title = (j % 2 === 0) ? "デスノート" : original;
            j++;

            // ⏱️ ~0.6s
            if (j > 5) {
              clearInterval(blink);
              document.title = original;
              done++;

              if (done < blinkCount) {
                setTimeout(doBlink, 120);
              } else {
                loop();
              }
            }
          }, 120);
        }

        doBlink();

      }, delay);
    }

    loop();
  }
})();


(function(){
  var canvas = document.getElementById('cursor-layer');
  if (!canvas) return;
  if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return;

  var ctx = canvas.getContext('2d', { alpha: true });
  if (!ctx) return;

  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var width = 0;
  var height = 0;
  var pointer = {
    x: window.innerWidth * 0.5,
    y: window.innerHeight * 0.5,
    px: window.innerWidth * 0.5,
    py: window.innerHeight * 0.5,
    visible: false
  };
  var ghosts = [];
  var lastStamp = 0;

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.max(1, Math.floor(width * dpr));
    canvas.height = Math.max(1, Math.floor(height * dpr));
    canvas.style.width = width + 'px';
    canvas.style.height = height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function activate() {
    if (!pointer.visible) {
      pointer.visible = true;
      canvas.classList.add('active');
    }
  }

  function deactivate() {
    pointer.visible = false;
    ghosts.length = 0;
    canvas.classList.remove('active');
    ctx.clearRect(0, 0, width, height);
  }

  function stampGhost(x, y, strength, dx, dy, spread) {
    ghosts.push({
      x: x,
      y: y,
      dx: dx,
      dy: dy,
      life: 1.1,
      ttl: 0.06 + strength * 0.03,
      size: 8.1 + strength * 9.4 + spread,
      spread: spread
    });

    if (ghosts.length > 14) ghosts.shift();
  }

  function onMove(e) {
    activate();
    var now = performance.now();
    pointer.px = pointer.x;
    pointer.py = pointer.y;
    pointer.x = e.clientX;
    pointer.y = e.clientY;

    var dx = pointer.x - pointer.px;
    var dy = pointer.y - pointer.py;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 1.5) return;

    var dirX = dx / dist;
    var dirY = dy / dist;
    var strength = Math.min(1, dist / 18);
if (now - lastStamp < 2 && dist < 12) return;
    lastStamp = now;
var steps = Math.floor(dist / 6);

for (var i = 1; i <= steps; i++) {
  var t = i / (steps + 1);
  stampGhost(
    pointer.px + dx * t,
    pointer.py + dy * t,
    strength * 0.9,
    dx,
    dy,
    0
  );
}
    stampGhost(
      pointer.x - dirX * Math.min(4, dist * 0.22),
      pointer.y - dirY * Math.min(4, dist * 0.22),
      strength,
      dx,
      dy,
      0
    );

    if (dist > 7) {
      stampGhost(
        pointer.x - dirX * Math.min(7, dist * 0.38),
        pointer.y - dirY * Math.min(7, dist * 0.38),
        strength * 0.92,
        dx,
        dy,
        0.45
      );
    }

    if (dist > 11) {
      stampGhost(
        pointer.x - dirX * Math.min(10, dist * 0.52),
        pointer.y - dirY * Math.min(10, dist * 0.52),
        strength * 0.78,
        dx,
        dy,
        0.9
      );
    }

    if (dist > 16) {
      stampGhost(
        pointer.x - dirX * Math.min(13, dist * 0.72),
        pointer.y - dirY * Math.min(13, dist * 0.72),
        strength * 0.58,
        dx,
        dy,
        1.35
      );
    }
  }
function drawGhost(ghost) {
  var alpha = ghost.life * 0.28;
  var size = ghost.size * ghost.life;
  var dist = Math.sqrt(ghost.dx * ghost.dx + ghost.dy * ghost.dy) || 1;
  var dirX = ghost.dx / dist;
  var dirY = ghost.dy / dist;
  var tailLength = Math.min(24, 7 + dist * 0.42 + ghost.spread * 1.8);
  var tailX = ghost.x - dirX * tailLength;
  var tailY = ghost.y - dirY * tailLength;
  var softWidth = Math.max(2.1, size * 0.42);

  var trailGradient = ctx.createLinearGradient(tailX, tailY, ghost.x, ghost.y);
  trailGradient.addColorStop(0, 'rgba(255, 0, 0, 0)');
  trailGradient.addColorStop(0.24, 'rgba(255, 0, 0, ' + (alpha * 0.08) + ')');
  trailGradient.addColorStop(0.64, 'rgba(255, 0, 0, ' + (alpha * 0.3) + ')');
trailGradient.addColorStop(1, 'rgba(120, 0, 0, ' + (alpha * 0.6) + ')');

  ctx.strokeStyle = trailGradient;
  ctx.lineWidth = softWidth;
  ctx.lineCap ='round';
  ctx.beginPath();
  ctx.moveTo(tailX, tailY);
  ctx.lineTo(ghost.x, ghost.y);
  ctx.stroke();

  var glow = ctx.createRadialGradient(ghost.x, ghost.y, 0, ghost.x, ghost.y, Math.max(4.5, size * 0.88));
  glow.addColorStop(0, 'rgba(255, 0, 0, ' + (alpha * 0.92) + ')');
  glow.addColorStop(0.28, 'rgba(255, 0, 0, ' + (alpha * 0.18) + ')');
  glow.addColorStop(0.62, 'rgba(255, 0, 0, ' + (alpha * 0.06) + ')');
  glow.addColorStop(1, 'rgba(255, 0, 0, 0)');
  ctx.fillStyle = glow;
 var rectSize = Math.max(4.5, size * 0.88);

ctx.beginPath();
ctx.moveTo(ghost.x - rectSize/2, ghost.y - rectSize/2);
ctx.lineTo(ghost.x + rectSize/2 + Math.random()*2, ghost.y - rectSize/2);
ctx.lineTo(ghost.x + rectSize/2, ghost.y + rectSize/2 + Math.random()*2);
ctx.lineTo(ghost.x - rectSize/2 - Math.random()*2, ghost.y + rectSize/2);
ctx.closePath();
ctx.fill();

  ctx.fillStyle = 'rgba(255, 0, 0, ' + (alpha * 0.9) + ')';
  ctx.beginPath();
  ctx.arc(ghost.x, ghost.y, Math.max(1.1, size * 0.14), 0, Math.PI * 2);
  ctx.fill();
}

  function drawTrail(dt) {
    ctx.clearRect(0, 0, width, height);
    if (!pointer.visible || ghosts.length === 0) return;

    for (var i = ghosts.length - 1; i >= 0; i--) {
      var ghost = ghosts[i];
      ghost.life -= dt / ghost.ttl;
      if (ghost.life <= 0) {
        ghosts.splice(i, 1);
        continue;
      }
      ghost.x -= ghost.dx * 0.0068 * ghost.life;
      ghost.y -= ghost.dy * 0.0068 * ghost.life;
      ghost.dx *= 0.88;
      ghost.dy *= 0.88;
      drawGhost(ghost);
    }
  }

  var previousTime = performance.now();
  function tick() {
    var now = performance.now();
    var dt = Math.min(0.032, (now - previousTime) / 1000);
    previousTime = now;
    drawTrail(dt);
    window.requestAnimationFrame(tick);
  }

  resize();
  tick();

  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', onMove, { passive: true });
  window.addEventListener('mouseenter', activate, { passive: true });
  window.addEventListener('mouseleave', deactivate, { passive: true });
  window.addEventListener('mouseout', function(e){
    if (!e.relatedTarget) deactivate();
  }, { passive: true });
  window.addEventListener('blur', deactivate);
  document.addEventListener('visibilitychange', function(){
    if (document.hidden) deactivate();
  });
})();
</script>

</body>
</html>
