<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

// ── Firebase init ──────────────────────────────────────────────────────────
const FB = {

  databaseURL:"https://scrapfielddatabase-default-rtdb.firebaseio.com",

};
const app = initializeApp(FB);
const db  = getDatabase(app);

// ── SHA-256 helper ─────────────────────────────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Expose FB helpers to global scope ─────────────────────────────────────
window._db  = db;
window._ref = ref;
window._push = push;
window._remove = remove;
window._get = get;
window._set = set;
window._sha256 = sha256;

get(passRef).then(snap => {

    sha256('shlimazl').then(hash => set(passRef, hash));
  }
});

// ── Subscribe to posts ─────────────────────────────────────────────────────
onValue(ref(db, 'blog/posts'), snap => {
  const raw = [];
  snap.forEach(c => raw.push({id: c.key, ...c.val()}));
  window._allPosts = raw.reverse(); // newest first by default
  filterPosts();
});

// ── Inject admin panel only if URL param ?admin present ───────────────────
const IS_ADMIN_URL = new URLSearchParams(window.location.search).has('admin');
if (IS_ADMIN_URL) {

}

<script>
// ═══════════════════════════════════════════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════════════════════════════════════════
window._allPosts = [];
let _isAdmin = false;
let _imgUrl  = null;
let _imgInfo = null;
const _embedLinks = [];

// ═══════════════════════════════════════════════════════════════════════════
// DATE FORMATTING
// ═══════════════════════════════════════════════════════════════════════════
function fmtDate(ts) {
  const d   = new Date(ts);
  const DAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${DAY[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')} ${MON[d.getMonth()]} ${d.getFullYear()} — `
       + `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function isoDate(ts) { return new Date(ts).toISOString().slice(0,10); }

// ═══════════════════════════════════════════════════════════════════════════
// EMBED DETECTION
// ═══════════════════════════════════════════════════════════════════════════
const EPATS = [
  { re: /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?[^\s]*v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/g,
    build: m => ({ src:`https://www.youtube.com/embed/${m[1]}?rel=0&modestbranding=1`, url:m[0] }) },
  { re: /https?:\/\/open\.spotify\.com\/(?:intl-[a-z]{2}\/)?(track|album|playlist|episode)\/([a-zA-Z0-9]+)(?:\?[^\s]*)?/g,
    build: m => ({ src:`https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator&theme=0`, url:m[0] }) },
  { re: /https?:\/\/(?:www\.)?soundcloud\.com\/[a-zA-Z0-9_-]+\/[a-zA-Z0-9_-]+(?:\?[^\s]*)?/g,
    build: m => ({ src:`https://w.soundcloud.com/player/?url=${encodeURIComponent(m[0])}&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false`, url:m[0] }) }
];
function detectEmbeds(html) {
  const text = html.replace(/<[^>]*>/g,' ');
  const found = [];
  for (const p of EPATS) {
    p.re.lastIndex = 0;
    let m;
    while ((m = p.re.exec(text)) !== null) {
      const b = p.build(m);
      if (!found.some(e => e.url === b.url)) found.push(b);
    }
  }
  return found;
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER POSTS
// ═══════════════════════════════════════════════════════════════════════════
function filterPosts() {
  const sort = document.getElementById('sortSelect')?.value || 'newest';
  let posts = [...window._allPosts];
  if (sort === 'oldest') posts.reverse();
  renderPosts(posts, document.getElementById('postsContainer'), false);
}
window.filterPosts = filterPosts;

function renderPosts(posts, container, adminMode) {
  if (!container) return;
  if (!posts.length) { container.innerHTML = '<div class="no-posts">no posts found.</div>'; return; }
  const total = posts.length;
  container.innerHTML = posts.map((p, i) => buildCard(p, total - i, adminMode)).join('');
  // Re-attach spoiler listeners
  container.querySelectorAll('.spoiler-text').forEach(el =>
    el.addEventListener('click', () => el.classList.toggle('revealed')));
  container.querySelectorAll('.spoiler-img-wrap').forEach(el =>
    el.addEventListener('click', () => el.classList.toggle('revealed')));
  container.querySelectorAll('.post-img-wrap img').forEach(img =>
    img.addEventListener('click', () => openLb(img.src)));
}

function buildCard(p, num, adminMode) {
  const embeds = detectEmbeds((p.contentHtml || '') + (p.embedUrls ? '\n' + p.embedUrls.join('\n') : ''));
  const embedHTML = embeds.map(e =>
    `<div class="post-embed"><iframe src="${e.src}" width="100%" height="95" frameborder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>`
  ).join('');

  let imgHTML = '';
  if (p.imageSrc) {
    const info = p.imageInfo
      ? `<span class="post-img-file-info">File: ${p.imageInfo.name} (${p.imageInfo.sizeKB} KB, ${p.imageInfo.w}×${p.imageInfo.h})</span>`
      : '';
    const cls = p.spoilerImg ? 'post-img-wrap spoiler-img-wrap' : 'post-img-wrap';
    imgHTML = info + `<div class="${cls}"><img src="${p.imageSrc}" alt="" loading="lazy"></div>`;
  }

  const delHTML = (_isAdmin || adminMode)
    ? `<div class="post-actions"><button class="post-del-btn" onclick="deletePost('${p.id}')">delete</button></div>` : '';

  return `<div class="post-card" id="post-${p.id}">
    <div class="post-card-header">
      <span class="post-author">Settembre</span>
      <span class="post-date">${fmtDate(p.ts)}</span>
      <span class="post-no">No.${num}</span>
    </div>
    <div class="post-body">
      ${imgHTML}
      <div class="post-content">${p.contentHtml || ''}</div>
      <div style="clear:both;"></div>
      ${embedHTML}
    </div>
    ${delHTML}
  </div>`;
}

async function deletePost(id) {
  if (!_isAdmin) return;
  if (!confirm('delete this post?')) return;
  try {
    await window._remove(window._ref(window._db, 'blog/posts/' + id));
    document.getElementById('post-' + id)?.remove();
  } catch(e) { alert('error: ' + e.message); }
}
window.deletePost = deletePost;

// EDITOR HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function ed() { return document.getElementById('postEditor'); }

function fmt(cmd, val) {
  ed().focus();
  document.execCommand(cmd, false, val || null);
}
window.fmt = fmt;

function applyFont(family) {
  if (!family) return;
  const editor = ed();
  editor.focus();
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (!editor.contains(range.commonAncestorContainer)) return;

  if (range.collapsed) {
    // No selection — apply via execCommand (affects next typed chars)
    document.execCommand('fontName', false, family);
    return;
  }
  // Wrap selection in a styled span
  const span = document.createElement('span');
  span.style.fontFamily = family;
  try {
    const frag = range.extractContents();
    span.appendChild(frag);
    range.insertNode(span);
    const r2 = document.createRange();
    r2.selectNodeContents(span);
    sel.removeAllRanges(); sel.addRange(r2);
  } catch(_) {
    document.execCommand('fontName', false, family);
  }
}
window.applyFont = applyFont;

function edInsertSpoiler() {
  const editor = ed();
  editor.focus();
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (!editor.contains(range.commonAncestorContainer)) return;

  const selectedText = range.toString();
  const span = document.createElement('span');
  span.className = 'spoiler-text';
  span.textContent = selectedText || 'spoiler text';
  span.addEventListener('click', () => span.classList.toggle('revealed'));

  if (selectedText) range.deleteContents();
  range.insertNode(span);

  // Move cursor after span
  const r2 = document.createRange();
  r2.setStartAfter(span); r2.collapse(true);
  sel.removeAllRanges(); sel.addRange(r2);
}
window.edInsertSpoiler = edInsertSpoiler;

function edInsertLink() {
  const url = prompt('URL:');
  if (!url) return;
  ed().focus();
  document.execCommand('createLink', false, url);
  // Ensure link opens in new tab
  ed().querySelectorAll('a[href="'+url+'"]').forEach(a => {
    a.target = '_blank'; a.rel = 'noopener noreferrer';
    if (!a.style.color) a.style.color = '#0000cc';
  });
}
window.edInsertLink = edInsertLink;

function edInsertBlockquote() {
  const editor = ed();
  editor.focus();
  const sel = window.getSelection();
  const txt = (sel && !sel.isCollapsed) ? sel.toString() : '';
  const bq = document.createElement('blockquote');
  bq.style.cssText = 'border-left:3px solid #bbb;margin:4px 0;padding:4px 8px;color:#555;font-style:italic;';
  bq.textContent = txt || 'quote';
  if (sel && sel.rangeCount && editor.contains(sel.getRangeAt(0).commonAncestorContainer)) {
    const range = sel.getRangeAt(0);
    if (txt) range.deleteContents();
    range.insertNode(bq);
    const r2 = document.createRange();
    r2.setStartAfter(bq); r2.collapse(true);
    sel.removeAllRanges(); sel.addRange(r2);
  } else {
    editor.appendChild(bq);
  }
}
window.edInsertBlockquote = edInsertBlockquote;

function edInsertPre() {
  const editor = ed();
  editor.focus();
  const sel   = window.getSelection();
  const txt   = (sel && !sel.isCollapsed) ? sel.toString() : '';
  const pre   = document.createElement('pre');
  pre.textContent = txt || '';
  if (sel && sel.rangeCount && editor.contains(sel.getRangeAt(0).commonAncestorContainer)) {
    const range = sel.getRangeAt(0);
    if (txt) range.deleteContents();
    range.insertNode(pre);
  } else {
    editor.appendChild(pre);
  }
  // Move cursor inside pre
  const r2 = document.createRange();
  r2.selectNodeContents(pre); r2.collapse(false);
  sel.removeAllRanges(); sel.addRange(r2);
}
window.edInsertPre = edInsertPre;

  ed().innerHTML = '';
  removeEditorImg();
}

// IMAGE HANDLING
// ═══════════════════════════════════════════════════════════════════════════
async function onEditorPaste(e) {
  const items = e.clipboardData?.items || [];
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (file) await uploadAndInsert(file);
      return;
    }
  }
  // Plain text paste — strip formatting
  e.preventDefault();
  const text = e.clipboardData.getData('text/plain');
  if (text) document.execCommand('insertText', false, text);
}

async function handleFileSelect(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  if (file.size > 600 * 1024) { alert('max 600 KB'); return; }
  await uploadAndInsert(file);
}
window.handleFileSelect = handleFileSelect;

async function uploadAndInsert(file) {
  const statusEl = document.getElementById('edStatus');
  const fnameEl  = document.getElementById('edFileName');
  const rmBtn    = document.getElementById('edRemoveImg');
  if (statusEl) statusEl.textContent = 'uploading...';

  // Read dimensions first
  const tmpUrl = URL.createObjectURL(file);
  const tmpImg = new Image();
  tmpImg.src = tmpUrl;
  await new Promise(res => { tmpImg.onload = tmpImg.onerror = res; });
  const w = tmpImg.naturalWidth, h = tmpImg.naturalHeight;
  URL.revokeObjectURL(tmpUrl);
  const sizeKB = (file.size / 1024).toFixed(1);

  try {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', 'unsigned_upload');
    const res  = await fetch('https://api.cloudinary.com/v1_1/dagsxkazw/image/upload', { method:'POST', body:fd });
    const data = await res.json();
    if (!data.secure_url) throw new Error('upload failed');

    _imgUrl  = data.secure_url;
    _imgInfo = { name: file.name, sizeKB, w, h };

    if (fnameEl) fnameEl.textContent = file.name;
    if (rmBtn)   rmBtn.style.display  = 'inline-block';
    if (statusEl) statusEl.textContent = 'image ready.';

    insertImgPreview(data.secure_url, file.name, sizeKB, w, h);
  } catch(err) {
    if (statusEl) statusEl.textContent = 'upload failed.';
    console.error(err);
  }
}

function insertImgPreview(src, name, sizeKB, w, h) {
  const editor = ed();
  // Remove previous preview elements
  editor.querySelectorAll('img.ed-img, .ed-img-info').forEach(el => el.remove());

  const info = document.createElement('div');
  info.className = 'ed-img-info';
  info.contentEditable = 'false';
  info.textContent = `File: ${name} (${sizeKB} KB, ${w}×${h})`;

  const img = document.createElement('img');
  img.src = src;
  img.className = 'ed-img';
  img.contentEditable = 'false';
  img.draggable = false;

  editor.insertBefore(img,  editor.firstChild);
  editor.insertBefore(info, editor.firstChild);
  editor.scrollTop = 0;
}

function removeEditorImg() {
  _imgUrl = null; _imgInfo = null;
  ed()?.querySelectorAll('img.ed-img, .ed-img-info').forEach(el => el.remove());
  const fn = document.getElementById('edFileName');
  const rb = document.getElementById('edRemoveImg');
  if (fn) fn.textContent = 'no file';
  if (rb) rb.style.display = 'none';
}
window.removeEditorImg = removeEditorImg;

// SUBMIT POST
// ═══════════════════════════════════════════════════════════════════════════
async function submitPost() {
  if (!_isAdmin) return;
  const btn    = document.getElementById('submitBtn');
  const status = document.getElementById('edStatus');
  const editor = ed();

  // Build clean HTML (strip editor-only preview elements)
  const clone = editor.cloneNode(true);
  clone.querySelectorAll('img.ed-img, .ed-img-info').forEach(el => el.remove());
  const html = clone.innerHTML.trim();

  if (!html && !_imgUrl && !_embedLinks.length) {
    if (status) status.textContent = 'write something first.';
    return;
  }

  btn.disabled = true;
  if (status) status.textContent = 'posting...';

  try {
    await window._push(window._ref(window._db, 'blog/posts'), {
      contentHtml: html,
      imageSrc:    _imgUrl  || null,
      imageInfo:   _imgInfo || null,
      spoilerImg:  document.getElementById('edSpoilerImg')?.checked || false,
      embedUrls:   _embedLinks.length ? [..._embedLinks] : null,
      ts: Date.now()
    });

    clearEditor();
    _embedLinks.length = 0;
    renderEmbedList();
    const si = document.getElementById('edSpoilerImg');
    if (si) si.checked = false;
    if (status) { status.textContent = 'posted!'; setTimeout(() => { status.textContent = ''; }, 3000); }
  } catch(e) {
    if (status) status.textContent = 'error: ' + e.message;
  }
  btn.disabled = false;
}
window.submitPost = submitPost;

// ═══════════════════════════════════════════════════════════════════════════
// VIDEO BACKGROUND
// Fix: blogbg1 → (very fast fadeout at 32s remain) → 3s pause → blogbg2 → loop
// ═══════════════════════════════════════════════════════════════════════════
(function() {
  const v1 = document.getElementById('vid1');
  const v2 = document.getElementById('vid2');
  if (!v1 || !v2) return;

  const TRIGGER_S  = 32;    // seconds before end to start fadeout
  const FADEOUT_MS = 400;   // VERY fast fadeout
  const PAUSE_MS   = 3000;  // pause between videos
  const FADEIN_MS  = 1500;  // fade in speed

  let current  = 0; // 0=uninit, 1=v1, 2=v2
  let fadingOut = false;
  let fadeRaf  = null;

  function setOp(v, o) { v.style.opacity = String(Math.max(0, Math.min(1, o))); }

  function doFadeIn(v, onDone) {
    setOp(v, 0);
    const t0 = performance.now();
    (function step(now) {
      const p = Math.min((now - t0) / FADEIN_MS, 1);
      setOp(v, p);
      if (p < 1) requestAnimationFrame(step);
      else if (onDone) onDone();
    })(t0);
  }

  function doFadeOut(v, duration, onDone) {
    const s0 = parseFloat(v.style.opacity) || 1;
    const t0 = performance.now();
    if (fadeRaf) { cancelAnimationFrame(fadeRaf); fadeRaf = null; }
    (function step(now) {
      const p = Math.min((now - t0) / duration, 1);
      setOp(v, s0 * (1 - p));
      if (p < 1) { fadeRaf = requestAnimationFrame(step); }
      else { setOp(v, 0); fadeRaf = null; if (onDone) onDone(); }
    })(t0);
  }

  function startVideo(n) {
    current   = n;
    fadingOut = false;
    const cur   = n === 1 ? v1 : v2;
    const other = n === 1 ? v2 : v1;
    setOp(other, 0);
    cur.currentTime = 0;
    cur.play().catch(() => {});
    doFadeIn(cur, null);
  }

  // Per-video timeupdate handlers
  v1.addEventListener('timeupdate', () => {
    if (current !== 1 || fadingOut || !v1.duration || isNaN(v1.duration)) return;
    if (v1.duration - v1.currentTime <= TRIGGER_S) {
      fadingOut = true;
      doFadeOut(v1, FADEOUT_MS, null); // fade out very fast; video will end naturally
    }
  });
  v2.addEventListener('timeupdate', () => {
    if (current !== 2 || fadingOut || !v2.duration || isNaN(v2.duration)) return;
    if (v2.duration - v2.currentTime <= TRIGGER_S) {
      fadingOut = true;
      doFadeOut(v2, FADEOUT_MS, null);
    }
  });

  // On video end: pause, wait 3s, start next
  v1.addEventListener('ended', () => {
    fadingOut = false;
    if (fadeRaf) { cancelAnimationFrame(fadeRaf); fadeRaf = null; }
    setOp(v1, 0); v1.pause();
    setTimeout(() => startVideo(2), PAUSE_MS);
  });
  v2.addEventListener('ended', () => {
    fadingOut = false;
    if (fadeRaf) { cancelAnimationFrame(fadeRaf); fadeRaf = null; }
    setOp(v2, 0); v2.pause();
    setTimeout(() => startVideo(1), PAUSE_MS);
  });

  // Start on load
  function init() { startVideo(1); }
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    init();
  } else {
    document.addEventListener('DOMContentLoaded', init);
  }
  // Also re-trigger on first user click (bypass autoplay restrictions)
  document.addEventListener('click', function once() {
    if (current === 1 && (parseFloat(v1.style.opacity) || 0) < 0.05) startVideo(1);
    document.removeEventListener('click', once);
  }, { once: true });
})();
</script>
</body>
