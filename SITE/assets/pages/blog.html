<script>
const ADMIN_PASS = 'death1337';
let isAdmin = false;
let editorImgUrl = null;
window._allPosts = [];

// ── AUTH ──
function tryLogin(){
  if(document.getElementById('pwInput').value===ADMIN_PASS){
    isAdmin=true;
    document.getElementById('adminLogin').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    document.getElementById('loginErr').textContent='';
  } else {
    document.getElementById('loginErr').textContent='wrong password.';
  }
}
function logout(){
  isAdmin=false;
  document.getElementById('adminLogin').style.display='block';
  document.getElementById('adminPanel').style.display='none';
  document.getElementById('pwInput').value='';
}
window.tryLogin=tryLogin; window.logout=logout;

// ── TABS ──
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['posts','admin'][i]===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}
window.switchTab=switchTab;

// ── DATE ──
function fmtDate(ts){
  const d=new Date(ts);
  const DAY=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${DAY[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')} ${MON[d.getMonth()]} ${d.getFullYear()} — ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}
function isoDate(ts){return new Date(ts).toISOString().slice(0,10);}

// ── EMBEDS ──
const EPATS=[
  {name:'youtube',re:/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?[^\s]*v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/g,
   build:m=>({iframeSrc:`https://www.youtube.com/embed/${m[1]}?rel=0&modestbranding=1`,url:m[0]})},
  {name:'spotify',re:/https?:\/\/open\.spotify\.com\/(?:intl-[a-z]{2}\/)?(track|album|playlist|episode)\/([a-zA-Z0-9]+)(?:\?[^\s]*)?/g,
   build:m=>({iframeSrc:`https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator&theme=0`,url:m[0]})},
  {name:'soundcloud',re:/https?:\/\/(?:www\.)?soundcloud\.com\/[a-zA-Z0-9_-]+\/[a-zA-Z0-9_-]+(?:\?[^\s]*)?/g,
   build:m=>({iframeSrc:`https://w.soundcloud.com/player/?url=${encodeURIComponent(m[0])}&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false`,url:m[0]})}
];
function detectEmbeds(html){
  const text=html.replace(/<[^>]*>/g,' ');
  const found=[];
  for(const p of EPATS){p.re.lastIndex=0;let m;while((m=p.re.exec(text))!==null){const b=p.build(m);if(!found.some(e=>e.url===b.url))found.push(b);}}
  return found;
}

// ── RENDER ──
function filterPosts(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const sort=document.getElementById('sortSelect')?.value||'newest';
  let posts=[...window._allPosts];
  if(q) posts=posts.filter(p=>{
    const t=(p.contentHtml||'').replace(/<[^>]*>/g,'').toLowerCase();
    return t.includes(q)||isoDate(p.ts).includes(q)||fmtDate(p.ts).toLowerCase().includes(q);
  });
  if(sort==='oldest') posts.reverse();
  renderPosts(posts, document.getElementById('postsContainer'), false);
}
window.filterPosts=filterPosts;

function renderPosts(posts, container, adminMode){
  if(!container) return;
  if(!posts.length){container.innerHTML='<div class="no-posts">no posts found.</div>';return;}
  const total=posts.length;
  container.innerHTML=posts.map((p,i)=>buildCard(p,total-i,adminMode)).join('');
  container.querySelectorAll('.spoiler-text').forEach(el=>el.addEventListener('click',()=>el.classList.toggle('revealed')));
  container.querySelectorAll('.spoiler-img-wrap').forEach(el=>el.addEventListener('click',()=>el.classList.toggle('revealed')));
  container.querySelectorAll('.post-img-wrap img').forEach(img=>img.addEventListener('click',()=>openLb(img.src)));
}

function buildCard(p, num, adminMode){
  const embeds=detectEmbeds(p.contentHtml||'');
  const embedHTML=embeds.map(e=>`<div class="post-embed"><iframe src="${e.iframeSrc}" width="100%" height="95" frameborder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>`).join('');
  let imgHTML='';
  if(p.imageSrc){
    const cls=p.spoilerImg?'post-img-wrap spoiler-img-wrap':'post-img-wrap';
    imgHTML=`<div class="${cls}"><img src="${p.imageSrc}" alt="" loading="lazy"></div>`;
  }
  const canDel=isAdmin||adminMode;
  const delHTML=canDel?`<div class="post-actions"><button class="post-del-btn" onclick="deletePost('${p.id}')">delete</button></div>`:'';
  return `<div class="post-card" id="post-${p.id}">
    <div class="post-card-header">
      <span class="post-author">Settembre</span>
      <span class="post-date">${fmtDate(p.ts)}</span>
      <span class="post-no">No.${num}</span>
    </div>
    <div class="post-body">
      ${imgHTML}
      <div class="post-content">${p.contentHtml||''}</div>
      ${embedHTML}
    </div>
    ${delHTML}
  </div>`;
}

async function deletePost(id){
  if(!isAdmin){return;}
  if(!confirm('delete this post?')) return;
  try{
    await window._fbRemove(window._fbRef(window._fbDb,'blog/posts/'+id));
    document.getElementById('post-'+id)?.remove();
  }catch(e){alert('error: '+e.message);}
}
window.deletePost=deletePost;

// ── EDITOR ──
function fmt(cmd,val){document.getElementById('postEditor').focus();document.execCommand(cmd,false,val||null);}
window.fmt=fmt;

function insertSpoilerText(){
  const sel=window.getSelection();
  const txt=sel&&sel.toString()?sel.toString():'spoiler text';
  document.getElementById('postEditor').focus();
  document.execCommand('insertHTML',false,`<span class="spoiler-text" onclick="this.classList.toggle('revealed')">${txt}</span>`);
}
window.insertSpoilerText=insertSpoilerText;

function insertLink(){const url=prompt('URL:');if(url){document.getElementById('postEditor').focus();document.execCommand('createLink',false,url);}}
window.insertLink=insertLink;

function clearEditor(){document.getElementById('postEditor').innerHTML='';removeEditorImg();}
window.clearEditor=clearEditor;

function handleEditorPaste(e){e.preventDefault();const t=e.clipboardData.getData('text/plain');if(t)document.execCommand('insertText',false,t);}
window.handleEditorPaste=handleEditorPaste;

async function handleEditorImg(event){
  const file=event.target.files[0];
  if(!file) return;
  if(file.size>600*1024){alert('max 600kb');event.target.value='';return;}
  document.getElementById('edStatus').textContent='uploading...';
  try{
    const fd=new FormData();
    fd.append('file',file);
    fd.append('upload_preset','unsigned_upload');
    const res=await fetch(`https://api.cloudinary.com/v1_1/dagsxkazw/image/upload`,{method:'POST',body:fd});
    const data=await res.json();
    if(!data.secure_url) throw new Error('failed');
    editorImgUrl=data.secure_url;
    document.getElementById('edFileName').textContent=file.name;
    document.getElementById('edRemoveImg').style.display='inline-block';
    document.getElementById('edStatus').textContent='image ready.';
  }catch(e){document.getElementById('edStatus').textContent='upload failed.';console.error(e);}
  event.target.value='';
}
window.handleEditorImg=handleEditorImg;

function removeEditorImg(){
  editorImgUrl=null;
  document.getElementById('edFileName').textContent='no file';
  document.getElementById('edRemoveImg').style.display='none';
}
window.removeEditorImg=removeEditorImg;

async function submitPost(){
  if(!isAdmin) return;
  const btn=document.getElementById('submitBtn');
  const status=document.getElementById('edStatus');
  const html=document.getElementById('postEditor').innerHTML.trim();
  if(!html&&!editorImgUrl){status.textContent='write something first.';return;}
  btn.disabled=true; status.textContent='posting...';
  try{
    await window._fbPush(window._fbRef(window._fbDb,'blog/posts'),{
      contentHtml:html,
      imageSrc:editorImgUrl||null,
      spoilerImg:document.getElementById('edSpoilerImg').checked,
      ts:Date.now()
    });
    clearEditor();
    document.getElementById('edSpoilerImg').checked=false;
    status.textContent='posted!';
    setTimeout(()=>{status.textContent='';},3000);
  }catch(e){status.textContent='error: '+e.message;}
  btn.disabled=false;
}
window.submitPost=submitPost;

function adminSearchPosts(){
  const q=document.getElementById('adminSearch').value.toLowerCase().trim();
  const c=document.getElementById('adminSearchResults');
  if(!q){c.innerHTML='';return;}
  const m=window._allPosts.filter(p=>{
    const t=(p.contentHtml||'').replace(/<[^>]*>/g,'').toLowerCase();
    return t.includes(q)||isoDate(p.ts).includes(q)||fmtDate(p.ts).toLowerCase().includes(q);
  });
  if(!m.length){c.innerHTML='<div class="no-posts" style="color:#555;">no matches.</div>';return;}
  renderPosts(m,c,true);
}
window.adminSearchPosts=adminSearchPosts;

// ── LIGHTBOX ──
function openLb(src){document.getElementById('lbImg').src=src;document.getElementById('lightbox').classList.add('active');document.addEventListener('keydown',lbK);}
function closeLb(){document.getElementById('lightbox').classList.remove('active');document.removeEventListener('keydown',lbK);}
function lbK(e){if(e.key==='Escape')closeLb();}
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLb();});
window.closeLb=closeLb;

// ── VIDEO BG ──
(function(){
  const v1=document.getElementById('vid1');
  const v2=document.getElementById('vid2');
  if(!v1||!v2) return;

  const FADE_SECS=32;
  const PAUSE_MS=3000;
  const FADEIN_MS=1500;
  let active=1, fadingOut=false, fadeRaf=null;

  function setOp(v,o){v.style.opacity=String(Math.max(0,Math.min(1,o)));}

  function fadeIn(v,cb){
    const t0=performance.now();
    (function step(now){
      const p=Math.min((now-t0)/FADEIN_MS,1);
      setOp(v,p);
      if(p<1) requestAnimationFrame(step); else if(cb) cb();
    })(t0);
  }

  function startVid(n){
    const cur=n===1?v1:v2, other=n===1?v2:v1;
    active=n; fadingOut=false;
    setOp(other,0);
    cur.currentTime=0;
    cur.play().catch(()=>{});
    fadeIn(cur,null);
  }

  function tick(){
    const v=active===1?v1:v2;
    if(!v.duration||isNaN(v.duration)) return;
    const rem=v.duration-v.currentTime;
    if(rem<=FADE_SECS&&!fadingOut){
      fadingOut=true;
      const t0=performance.now(), dur=rem*1000, s0=parseFloat(v.style.opacity)||1;
      if(fadeRaf){cancelAnimationFrame(fadeRaf);fadeRaf=null;}
      (function step(now){
        const p=Math.min((now-t0)/dur,1);
        setOp(v,s0*(1-p));
        if(p<1){fadeRaf=requestAnimationFrame(step);}
      })(t0);
    }
  }

  v1.addEventListener('timeupdate',tick);
  v2.addEventListener('timeupdate',tick);

  function onEnd(n){
    return function(){
      fadingOut=false;
      if(fadeRaf){cancelAnimationFrame(fadeRaf);fadeRaf=null;}
      const v=n===1?v1:v2;
      setOp(v,0); v.pause();
      setTimeout(()=>startVid(n===1?2:1),PAUSE_MS);
    };
  }

  v1.addEventListener('ended',onEnd(1));
  v2.addEventListener('ended',onEnd(2));

  document.addEventListener('DOMContentLoaded',()=>startVid(1));
  document.addEventListener('click',function once(){startVid(1);document.removeEventListener('click',once);},{once:true});
})();
</script>
