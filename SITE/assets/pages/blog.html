<script>
(function(){
  var IDS=['oG7EaSELOiM','e6sSMIfG94k'],idx=0,muted=true,player=null,swapLock=false,timer=null;
  function fade(on){var el=document.getElementById('videoFade');if(el)el.classList.toggle('active',!!on);}
  function loadNext(){
    if(!player||swapLock) return;
    swapLock=true; fade(true); idx=(idx+1)%IDS.length;
    player.loadVideoById({videoId:IDS[idx]});
    setTimeout(function(){fade(false);swapLock=false;},450);
  }
  function watchEnd(){
    clearInterval(timer);
    timer=setInterval(function(){
      if(!player||swapLock||typeof player.getDuration!=='function') return;
      var d=player.getDuration()||0,t=player.getCurrentTime()||0;
      if(d>40&&d-t<=32) loadNext();
    },500);
  }
  window.onYouTubeIframeAPIReady=function(){
    player=new YT.Player('ytBg',{videoId:IDS[idx],playerVars:{
      autoplay:1,controls:0,disablekb:1,fs:0,iv_load_policy:3,modestbranding:1,
      playsinline:1,rel:0,mute:1
    },events:{
      onReady:function(e){e.target.mute();e.target.playVideo();watchEnd();},
      onStateChange:function(e){if(e.data===YT.PlayerState.ENDED) loadNext();}
    }});
  };

  /* ── MUSIC TOGGLE (FIX) ── */
  function applyMute(){
    var btn=document.getElementById('musicBtn');
    if(player && typeof player.getPlayerState === 'function'){
      if(muted){
        player.mute();
      } else {
        // unMute, set full volume, ensure playing
        player.unMute();
        player.setVolume(100);
        // if paused or not started, force play
        var state=player.getPlayerState();
        if(state===YT.PlayerState.PAUSED||state===YT.PlayerState.CUED||state===-1){
          player.playVideo();
        }
      }
    }
    if(btn) btn.textContent=muted?'Music: Off':'Music: On';
  }
  window.toggleMusic=function(){
    muted=!muted;
    applyMute();
  };

  if(window.YT&&YT.Player) window.onYouTubeIframeAPIReady();
  else {
    var tag=document.createElement('script');
    tag.src='https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  }
})();
</script>

<script>
window._allPosts=[];
window._isAdmin=false;
let _imgUrl=null,_imgInfo=null;

function escHTML(v){
  return String(v??'').replace(/[&<>"']/g,ch=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}
function escAttr(v){return escHTML(v);}
function postTime(p){
  const n=Number(p?.ts);
  return Number.isFinite(n)?n:0;
}
function sortPostsNewest(posts){
  return [...posts].sort((a,b)=>postTime(b)-postTime(a)||String(b.id||'').localeCompare(String(a.id||'')));
}

/* ── DATE FORMAT ── */
function fmtDate(ts){
  const d=new Date(ts);
  const DAY=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MM=String(d.getMonth()+1).padStart(2,'0');
  const DD=String(d.getDate()).padStart(2,'0');
  const YY=String(d.getFullYear()).slice(-2);
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  const ss=String(d.getSeconds()).padStart(2,'0');
  return `${MM}/${DD}/${YY}(${DAY[d.getDay()]})${hh}:${mm}:${ss}`;
}

/* ── PARSER ── */
function parse4chan(raw){
  if(!raw) return {html:'',embedUrls:[]};
  const embedUrls=[];
  const linkUrls=[];

  let s=raw.replace(/\/\/(https?:\/\/[^\s]+)/g,(match,url)=>{
    embedUrls.push(url);
    return '\x00EMB'+(embedUrls.length-1)+'\x00';
  });
  s=s.replace(/(?<![:/])\/(?!\/)(https?:\/\/[^\s]+)/g,(match,url)=>{
    linkUrls.push(url);
    return '\x00LNK'+(linkUrls.length-1)+'\x00';
  });
  s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s=s.split('\n').map(line=>{
    const t=line.trimStart();
    if(t.startsWith('&gt;')) return '<span class="redtext">'+line+'</span>';
    return line;
  }).join('\n');
  s=s.replace(/\|([^|\n]+)\|/g,'<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
  s=s.replace(/\x00EMB(\d+)\x00/g,(_,i)=>{
    const url=embedUrls[parseInt(i)];
    return '<a href="'+url+'" class="red-link" target="_blank" rel="noopener">'+url+'</a>';
  });
  s=s.replace(/\x00LNK(\d+)\x00/g,(_,i)=>{
    const url=linkUrls[parseInt(i)];
    return '<a href="'+url+'" class="red-link" target="_blank" rel="noopener">'+url+'</a>';
  });
  s=s.replace(/\n/g,'<br>');
  return {html:s,embedUrls};
}

/* ── EMBED DETECTION ── */
const EPATS=[
  {re:/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?[^\s"<]*v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/g,
   build:m=>({src:'https://www.youtube.com/embed/'+m[1]+'?rel=0&modestbranding=1',url:m[0],h:95})},
  {re:/https?:\/\/open\.spotify\.com\/(?:intl-[a-z]{2}\/)?(track|album|playlist|episode)\/([a-zA-Z0-9]+)(?:[?&][^\s"<]*)?/g,
   build:m=>({src:'https://open.spotify.com/embed/'+m[1]+'/'+m[2]+'?utm_source=generator&theme=0',url:m[0],h:95})},
  {re:/https?:\/\/(?:www\.)?soundcloud\.com\/[a-zA-Z0-9_-]+\/[a-zA-Z0-9_-]+(?:[?&][^\s"<]*)?/g,
   build:m=>({src:'https://w.soundcloud.com/player/?url='+encodeURIComponent(m[0])+'&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false',url:m[0],h:95})}
];
function detectEmbeds(text){
  const found=[];
  for(const p of EPATS){p.re.lastIndex=0;let m;while((m=p.re.exec(text))!==null){const b=p.build(m);if(!found.some(e=>e.url===b.url))found.push(b);}}
  return found;
}

/* ── FILTER / RENDER ── */
function filterPosts(){
  const container=document.getElementById('postsContainer');
  if(!container) return;
  const sort=document.getElementById('sortSelect')?.value||'newest';
  let posts=sortPostsNewest(window._allPosts);
  if(sort==='oldest') posts.reverse();
  renderPosts(posts,container,false);
}
window.filterPosts=filterPosts;

function renderPosts(posts,container,adminMode){
  if(!container) return;
  if(!posts.length){container.innerHTML='<div class="no-posts">no posts found.</div>';return;}
  const newest=sortPostsNewest(window._allPosts);
  const total=newest.length;
  container.innerHTML=posts.map(p=>{
    const realIndex=newest.findIndex(x=>x.id===p.id);
    const num=realIndex>=0?total-realIndex:total;
    try{return buildCard(p,num,adminMode);}
    catch(e){
      console.error('[renderPosts] post skipped:',p?.id,e);
      return '<div class="post-card"><div class="post-body">post render error.</div></div>';
    }
  }).join('');
  container.querySelectorAll('.post-img-wrap img').forEach(img=>img.addEventListener('click',()=>openLb(img.src)));
  container.querySelectorAll('.spoiler-img-wrap').forEach(el=>el.addEventListener('click',()=>el.classList.toggle('revealed')));
}

function buildCard(p,num,adminMode){
  let badges='';
  if(p.spoilerImg) badges+='<span class="post-badge badge-spoiler">spoiler image</span>';

  const header=`<div class="post-card-header">
    <span class="post-author">Settembre</span>
    <span class="post-date">${fmtDate(p.ts)}</span>
    <span class="post-no">No.${num}</span>
    ${badges}
  </div>`;

  const delHTML=(window._isAdmin||adminMode)
    ?`<div class="post-actions"><button class="post-del-btn" onclick="deletePost('${p.id}')">delete</button></div>`:'';

  const raw=p.contentRaw||'';

  let htmlContent;
  if(raw){
    htmlContent=parse4chan(raw).html;
  } else if(p.contentHtml){
    const stripped=p.contentHtml
      .replace(/<div><br\s*\/?><\/div>/gi,'\n')
      .replace(/<br\s*\/?>/gi,'\n')
      .replace(/<\/div>/gi,'\n')
      .replace(/<div>/gi,'')
      .replace(/&nbsp;/gi,' ')
      .replace(/&amp;/gi,'&')
      .replace(/&lt;/gi,'<')
      .replace(/&gt;/gi,'>')
      .trim();
    htmlContent=parse4chan(stripped).html;
  } else {
    htmlContent='';
  }

  const parsed=raw?parse4chan(raw):{html:'',embedUrls:[]};
  const embedsFromUrl=parsed.embedUrls.flatMap(url=>{
    const e=detectEmbeds(url);
    return e.length?e:[{src:null,url,h:95}];
  });
  const legacyEmbeds=p.noEmbeds?[]:detectEmbeds(raw).filter(e=>!parsed.embedUrls.includes(e.url));
  const allEmbeds=[...embedsFromUrl,...legacyEmbeds].filter(e=>e.src);

  const embedHTML=allEmbeds.map(e=>
    `<div class="post-embed"><iframe src="${e.src}" width="100%" height="${e.h||95}" frameborder="0"
      allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>`
  ).join('');

  let imgHTML='';
  if(p.imageSrc){
    const info=p.imageInfo?`<span class="post-img-file-info">File: ${escHTML(p.imageInfo.name)} (${escHTML(p.imageInfo.sizeKB)} KB, ${escHTML(p.imageInfo.w)}x${escHTML(p.imageInfo.h)})</span>`:'';
    const cls=p.spoilerImg?'post-img-wrap spoiler-img-wrap':'post-img-wrap';
    imgHTML=info+`<div class="${cls}"><img src="${escAttr(p.imageSrc)}" alt="" loading="lazy"></div>`;
  }

  const innerBody=`${imgHTML}<div class="post-content">${htmlContent}</div><div style="clear:both;"></div>${embedHTML}`;
  const bodyHTML=`<div class="post-body">${innerBody}</div>`;

  return `<div class="post-card" id="post-${p.id}">
    ${header}
    ${bodyHTML}
    ${delHTML}
  </div>`;
}

/* ── GREENTEXT AUTOCOMPLETE ── */
function setupGreentextAutocomplete(ta){
  if(!ta) return;
  let lastAutoGT=false;
  ta.addEventListener('keydown',function(e){
    if(e.key==='Enter'){
      const pos=this.selectionStart;
      const before=this.value.substring(0,pos);
      const lines=before.split('\n');
      const curLine=lines[lines.length-1];
      if(curLine.startsWith('>')){
        e.preventDefault();
        const after=this.value.substring(this.selectionEnd);
        this.value=before+'\n>'+after;
        const np=pos+2;
        this.selectionStart=this.selectionEnd=np;
        lastAutoGT=true;
        return;
      }
      lastAutoGT=false;
    } else if(e.key==='Backspace'&&lastAutoGT){
      const pos=this.selectionStart;
      if(pos>0&&this.value[pos-1]==='>'){
        e.preventDefault();
        const before=this.value.substring(0,pos-1);
        const after=this.value.substring(pos);
        this.value=before+after;
        this.selectionStart=this.selectionEnd=pos-1;
      }
      lastAutoGT=false;
    } else {
      lastAutoGT=false;
    }
  });
}

/* ── FILE UPLOAD ── */
async function handleFileSelect(event){
  const file=event.target.files[0]; event.target.value='';
  if(!file) return;
  if(file.size>600*1024){alert('max 600 KB');return;}
  const statusEl=document.getElementById('edStatus');
  const fnameEl=document.getElementById('edFileName');
  const rmBtn=document.getElementById('edRemoveImg');
  const preview=document.getElementById('edImgPreview');
  if(statusEl) statusEl.textContent='uploading…';
  const tmpUrl=URL.createObjectURL(file);
  const tmpImg=new Image(); tmpImg.src=tmpUrl;
  await new Promise(res=>{tmpImg.onload=tmpImg.onerror=res;});
  const w=tmpImg.naturalWidth, h=tmpImg.naturalHeight;
  URL.revokeObjectURL(tmpUrl);
  const sizeKB=(file.size/1024).toFixed(1);
  try{
    const fd=new FormData(); fd.append('file',file); fd.append('upload_preset','unsigned_upload');
    const res=await fetch('https://api.cloudinary.com/v1_1/dagsxkazw/image/upload',{method:'POST',body:fd});
    const data=await res.json();
    if(!data.secure_url) throw new Error('upload failed');
    _imgUrl=data.secure_url; _imgInfo={name:file.name,sizeKB,w,h};
    if(fnameEl) fnameEl.textContent=file.name;
    if(rmBtn) rmBtn.style.display='inline-block';
    if(statusEl) statusEl.textContent='image ready.';
    if(preview){
      preview.style.display='block';
      preview.innerHTML=`<img src="${escAttr(data.secure_url)}" alt=""><span class="ed-img-info">File: ${escHTML(file.name)} (${escHTML(sizeKB)} KB, ${escHTML(w)}x${escHTML(h)})</span>`;
    }
  }catch(err){if(statusEl) statusEl.textContent='upload error: '+err.message; console.error(err);}
}
window.handleFileSelect=handleFileSelect;

async function submitPost(){

  if(typeof window._push !== 'function' || typeof window._ref !== 'function' || !window._db){
    const status=document.getElementById('edStatus');
    if(status) status.textContent='aguarde, Firebase ainda carregando…';
    console.warn('[submitPost] Firebase não está pronto ainda.');
    return;
  }
  const btn=document.getElementById('submitBtn');
  const status=document.getElementById('edStatus');
  const raw=(document.getElementById('postTextarea')?.value||'').trim();
  if(!raw&&!_imgUrl){if(status)status.textContent='write something first.';return;}
  btn.disabled=true;
  if(status) status.textContent='posting…';
  try{
    const postData={
      imageSrc:  _imgUrl||null,
      imageInfo: _imgInfo||null,
      spoilerImg: document.getElementById('edSpoilerImg')?.checked||false,
      contentRaw: raw,
      ts: Date.now()
    };
    await window._push(window._ref(window._db,'blog/posts'),postData);
    document.getElementById('postTextarea').value='';
    removeEditorImg();
    const si=document.getElementById('edSpoilerImg'); if(si) si.checked=false;
    if(status){status.textContent='posted!';setTimeout(()=>{status.textContent='';},3000);}
  }catch(e){
    console.error('[submitPost] erro completo:',e);
    if(status) status.textContent='erro ao postar: '+e.message;
    btn.disabled=false;
    return;
  }
  btn.disabled=false;
}

/* ── CURSOR TRAIL (primary particles + ink ribbon overlay) ── */
(function(){
  var canvas=document.getElementById('cursor-layer');
  if(!canvas||window.matchMedia&&window.matchMedia('(pointer:coarse)').matches) return;
  var ctx=canvas.getContext('2d',{alpha:true}); if(!ctx) return;
  var dpr=Math.min(window.devicePixelRatio||1,2),w=0,h=0;
  var ptr={x:innerWidth*.5,y:innerHeight*.5,px:innerWidth*.5,py:innerHeight*.5,vis:false};

  var ghosts=[];       // primary red particle trail
  var ribbon=[];       // ink ribbon position history [{x,y,t}]
  var RIBBON_AGE=820;  // ms ribbon stays alive
  var ls=0;

  function resize(){
    w=innerWidth;h=innerHeight;
    dpr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=Math.max(1,Math.floor(w*dpr));
    canvas.height=Math.max(1,Math.floor(h*dpr));
    canvas.style.width=w+'px';canvas.style.height=h+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  function on(){if(!ptr.vis){ptr.vis=true;canvas.classList.add('active');}}
  function off(){
    ptr.vis=false;ghosts.length=0;ribbon.length=0;
    canvas.classList.remove('active');ctx.clearRect(0,0,w,h);
  }

  /* spawn primary ghost particle */
  function sg(x,y,str,dx,dy,sp){
    ghosts.push({x,y,dx,dy,life:1.1,ttl:.06+str*.03,size:8.1+str*9.4+sp,spread:sp});
    if(ghosts.length>14) ghosts.shift();
  }

  function mv(e){
    on();
    var now=performance.now();
    ptr.px=ptr.x;ptr.py=ptr.y;
    ptr.x=e.clientX;ptr.y=e.clientY;
    var dx=ptr.x-ptr.px,dy=ptr.y-ptr.py,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<1.5) return;

    /* ribbon: store every position, cap at 90 pts */
    ribbon.push({x:ptr.x,y:ptr.y,t:now});
    if(ribbon.length>90) ribbon.shift();

    var dirX=dx/dist,dirY=dy/dist,str=Math.min(1,dist/18);
    if(now-ls<6&&dist<7) return; ls=now;

    sg(ptr.x-dirX*Math.min(4,dist*.22), ptr.y-dirY*Math.min(4,dist*.22), str,dx,dy,0);
    if(dist>7)  sg(ptr.x-dirX*Math.min(7,dist*.38),  ptr.y-dirY*Math.min(7,dist*.38),  str*.92,dx,dy,.45);
    if(dist>11) sg(ptr.x-dirX*Math.min(10,dist*.52), ptr.y-dirY*Math.min(10,dist*.52), str*.78,dx,dy,.9);
    if(dist>16) sg(ptr.x-dirX*Math.min(13,dist*.72), ptr.y-dirY*Math.min(13,dist*.72), str*.58,dx,dy,1.35);
  }

  /* ── DRAW PRIMARY ghost particle ── */
  function dg(g){
    var a=g.life*.62,sz=g.size*g.life;
    var d=Math.sqrt(g.dx*g.dx+g.dy*g.dy)||1,dX=g.dx/d,dY=g.dy/d;
    var tl=Math.min(24,7+d*.42+g.spread*1.8),tx=g.x-dX*tl,ty=g.y-dY*tl,sw=Math.max(2.1,sz*.42);
    var tg=ctx.createLinearGradient(tx,ty,g.x,g.y);
    tg.addColorStop(0,'rgba(255,0,0,0)');
    tg.addColorStop(.24,'rgba(255,0,0,'+(a*.08)+')');
    tg.addColorStop(.64,'rgba(255,0,0,'+(a*.3)+')');
    tg.addColorStop(1,'rgba(255,0,0,'+(a*.96)+')');
    ctx.strokeStyle=tg;ctx.lineWidth=sw;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(g.x,g.y);ctx.stroke();
    var gl=ctx.createRadialGradient(g.x,g.y,0,g.x,g.y,Math.max(4.5,sz*.88));
    gl.addColorStop(0,'rgba(255,0,0,'+(a*.92)+')');
    gl.addColorStop(.28,'rgba(255,0,0,'+(a*.18)+')');
    gl.addColorStop(.62,'rgba(255,0,0,'+(a*.06)+')');
    gl.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=gl;ctx.beginPath();ctx.arc(g.x,g.y,Math.max(4.5,sz*.88),0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,0,0,'+(a*.9)+')';
    ctx.beginPath();ctx.arc(g.x,g.y,Math.max(1.1,sz*.14),0,Math.PI*2);ctx.fill();
  }

  /* ── DRAW INK RIBBON (smooth bezier overlay) ──
     Uses midpoint-quadratic technique for a perfectly smooth curve.
     'screen' composite = additive overlay: glows on dark, invisible on white.
     Width tapers: ~1px at tail → ~11px near cursor.
     Alpha is quadratic so the tail evaporates gently. */
  function drawRibbon(now){
    /* prune old points */
    while(ribbon.length>0 && now-ribbon[0].t>RIBBON_AGE) ribbon.shift();
    var live=ribbon;
    if(live.length<3) return;

    /* precompute midpoints for smooth bezier */
    var mids=[];
    for(var i=0;i<live.length-1;i++){
      mids.push({x:(live[i].x+live[i+1].x)*0.5, y:(live[i].y+live[i+1].y)*0.5});
    }

    ctx.save();
    ctx.globalCompositeOperation='screen'; /* additive overlay — glows on dark bg */
    ctx.lineCap='round';
    ctx.lineJoin='round';

    var n=live.length;
    for(var i=1;i<n-1;i++){
      var frac=i/(n-1);           /* 0 = oldest tail, 1 = newest head */
      var age_t=1-(now-live[i].t)/RIBBON_AGE; /* 1 = just born, 0 = dying */

      /* alpha: quadratic age × linear frac → tail evaporates, head visible */
      var a=age_t*age_t*frac*0.28;
      if(a<0.004) continue;

      /* width: very thin at tail, fuller near cursor */
      var lw=1.0+frac*frac*11;

      /* colour: deep wine at tail, brightens slightly near head */
      var rv=Math.floor(140+frac*100); /* 140→240 */
      ctx.strokeStyle='rgba('+rv+',0,8,'+a+')';
      ctx.lineWidth=lw;

      /* one smooth quadratic segment: prev-mid → control(live[i]) → next-mid */
      ctx.beginPath();
      ctx.moveTo(mids[i-1].x, mids[i-1].y);
      ctx.quadraticCurveTo(live[i].x, live[i].y, mids[i].x, mids[i].y);
      ctx.stroke();
    }

    /* thin bright highlight pass on top (the "sheen" of the ribbon) */
    ctx.globalCompositeOperation='screen';
    for(var i=Math.floor(n*0.5);i<n-1;i++){
      var frac=i/(n-1);
      var age_t=1-(now-live[i].t)/RIBBON_AGE;
      var a=age_t*age_t*frac*0.14;
      if(a<0.006) continue;
      ctx.strokeStyle='rgba(255,80,80,'+a+')';
      ctx.lineWidth=Math.max(0.5,(frac*frac*3.5));
      ctx.beginPath();
      ctx.moveTo(mids[i-1].x, mids[i-1].y);
      ctx.quadraticCurveTo(live[i].x, live[i].y, mids[i].x, mids[i].y);
      ctx.stroke();
    }

    ctx.restore();
  }

  function draw(dt,now){
    ctx.clearRect(0,0,w,h);
    if(!ptr.vis) return;

    /* ribbon first (behind), then primary particles on top */
    drawRibbon(now);

    for(var j=ghosts.length-1;j>=0;j--){
      var g=ghosts[j];
      g.life-=dt/g.ttl;
      if(g.life<=0){ghosts.splice(j,1);continue;}
      g.x-=g.dx*.0068*g.life; g.y-=g.dy*.0068*g.life;
      g.dx*=.88; g.dy*=.88;
      dg(g);
    }
  }

  var prev=performance.now();
  function tick(){
    var now=performance.now(),dt=Math.min(.032,(now-prev)/1000);
    prev=now; draw(dt,now); requestAnimationFrame(tick);
  }
  resize();tick();
  window.addEventListener('resize',resize);
  window.addEventListener('mousemove',mv,{passive:true});
  window.addEventListener('mouseenter',on,{passive:true});
  window.addEventListener('mouseleave',off,{passive:true});
  window.addEventListener('mouseout',function(e){if(!e.relatedTarget)off();},{passive:true});
  window.addEventListener('blur',off);
  document.addEventListener('visibilitychange',function(){if(document.hidden)off();});
})();
</script>
