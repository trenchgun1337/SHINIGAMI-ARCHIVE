<script>
window.WaTooltip = (function(){
  var el = document.getElementById('wa-tooltip');
  function show(anchor, html) {
    if (!el) return;
    el.innerHTML = html; el.style.display = 'block';
    var r = anchor.getBoundingClientRect();
    var tw = el.offsetWidth || 240, th = el.offsetHeight || 80;
    var left = r.left + r.width / 2 - tw / 2;
    var top  = r.top - th - 8;
    if (top  < 4) top  = r.bottom + 8;
    if (left < 4) left = 4;
    if (left + tw > window.innerWidth - 4) left = window.innerWidth - tw - 4;
    el.style.left = left + 'px'; el.style.top = top + 'px';
  }
  function hide() { if (el) el.style.display = 'none'; }
  return { show: show, hide: hide };
})();
</script>

<script>
// ── VIMEO PLAYER API + MUSIC TOGGLE ──
(function(){
  var _muted = true;
  var _player = null;

  // Inicia o player via API (background=1 já desativa controles)
  window.addEventListener('load', function(){
    var iframe = document.getElementById('vimeoBg');
    if (!iframe || typeof Vimeo === 'undefined') return;
    _player = new Vimeo.Player(iframe);
    _player.setMuted(true).catch(function(){});
  });

  function applyMute(){
    var btn = document.getElementById('musicBtn');
    if (_player) {
      _player.setMuted(_muted).catch(function(){});
      if (!_muted) {
        _player.setVolume(1).catch(function(){});
        _player.play().catch(function(){});
      }
    }
    if (btn) btn.textContent = _muted ? 'Music: Off' : 'Music: On';
  }

  window.toggleMusic = function(){
    _muted = !_muted;
    applyMute();
  };
})();
</script>

function fmtDate(ts) {
  const d=new Date(ts);
  const DAY=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MM=String(d.getMonth()+1).padStart(2,'0');
  const DD=String(d.getDate()).padStart(2,'0');
  const YY=String(d.getFullYear()).slice(-2);
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  const ss=String(d.getSeconds()).padStart(2,'0');
  return `${MM}/${DD}/${YY}(${DAY[d.getDay()]})${hh}:${mm}:${ss}`;
}

function parse4chan(raw) {
  if (!raw) return '';
  let s = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s = s.split('\n').map(line => {
    if (/^(&gt;)+/.test(line.trimStart())) return `<span class="greentext">${line}</span>`;
    return line;
  }).join('\n');
  s = s
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\/\/(.+?)\/\//g,'<em>$1</em>')
    .replace(/__(.+?)__/g,'<u>$1</u>')
    .replace(/~~(.+?)~~/g,'<s>$1</s>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\[spoiler\]([\s\S]+?)\[\/spoiler\]/gi,
      '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
  s = s.replace(/\n/g,'<br>');
  return s;
}

  { re:/https?:\/\/open\.spotify\.com\/(?:intl-[a-z]{2}\/)?(track|album|playlist|episode)\/([a-zA-Z0-9]+)(?:[?&][^\s"<]*)?/g,
    build:m=>({src:`https://open.spotify.com/embed/${m[1]}/${m[2]}?utm_source=generator&theme=0`,url:m[0],h:95}) },
  { re:/https?:\/\/(?:www\.)?soundcloud\.com\/[a-zA-Z0-9_-]+\/[a-zA-Z0-9_-]+(?:[?&][^\s"<]*)?/g,
    build:m=>({src:`https://w.soundcloud.com/player/?url=${encodeURIComponent(m[0])}&color=%23ff5500&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false`,url:m[0],h:95}) }
];
function detectEmbeds(text) {
  const found=[];
  for(const p of EPATS){ p.re.lastIndex=0; let m; while((m=p.re.exec(text))!==null){ const b=p.build(m); if(!found.some(e=>e.url===b.url)) found.push(b); } }
  return found;
}

function filterPosts() {
  const sort=document.getElementById('sortSelect')?.value||'newest';
  let posts=[...window._allPosts];
  if(sort==='oldest') posts.reverse();
  renderPosts(posts, document.getElementById('postsContainer'), false);
}
window.filterPosts=filterPosts;

function renderPosts(posts, container, adminMode) {
  if(!container) return;
  if(!posts.length){ container.innerHTML='<div class="no-posts">no posts found.</div>'; return; }
  const total=posts.length;
  container.innerHTML=posts.map((p,i)=>buildCard(p,total-i,adminMode)).join('');
  container.querySelectorAll('.post-img-wrap img').forEach(img=>img.addEventListener('click',()=>openLb(img.src)));
  container.querySelectorAll('.spoiler-img-wrap').forEach(el=>el.addEventListener('click',()=>el.classList.toggle('revealed')));
}

function buildCard(p, num, adminMode) {
  const raw = p.contentRaw || '';
  const htmlContent = raw ? parse4chan(raw) : (p.contentHtml||'');
  const embedSrc = raw || (p.contentHtml||'').replace(/<[^>]*>/g,' ');
  const embeds = p.noEmbeds ? [] : detectEmbeds(embedSrc);
  const embedHTML = embeds.map(e=>
    `<div class="post-embed"><iframe src="${e.src}" width="100%" height="${e.h||95}" frameborder="0" allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe></div>`
  ).join('');

  let imgHTML='';
  if(p.imageSrc){
    const info=p.imageInfo?`<span class="post-img-file-info">File: ${p.imageInfo.name} (${p.imageInfo.sizeKB} KB, ${p.imageInfo.w}×${p.imageInfo.h})</span>`:'';
    const cls=p.spoilerImg?'post-img-wrap spoiler-img-wrap':'post-img-wrap';
    imgHTML=info+`<div class="${cls}"><img src="${p.imageSrc}" alt="" loading="lazy"></div>`;
  }

  const delHTML=(_isAdmin||adminMode)
    ?`<div class="post-actions"><button class="post-del-btn" onclick="deletePost('${p.id}')">delete</button></div>`:'';

  return `<div class="post-card" id="post-${p.id}">
    <div class="post-card-header">
      <span class="post-author">Settembre</span>
      <span class="post-date">${fmtDate(p.ts)}</span>
      <span class="post-no">No.${num}</span>
    </div>
    <div class="post-body">
      ${imgHTML}
      <div class="post-content">${htmlContent}</div>
      <div style="clear:both;"></div>
      ${embedHTML}
    </div>
    ${delHTML}
  </div>`;
}

async function deletePost(id) {
  if(!_isAdmin) return;
  if(!confirm('delete this post?')) return;
  try {
    await window._remove(window._ref(window._db,'blog/posts/'+id));
    document.getElementById('post-'+id)?.remove();
  } catch(e){ alert('error: '+e.message); }
}
window.deletePost=deletePost;

async function tryLogin() {
  const input=document.getElementById('pwInput').value;
  const errEl=document.getElementById('loginErr');
  errEl.textContent='checking…';
  try {
    const hash=await window._sha256(input);
    const snap=await window._get(window._ref(window._db,'admin/passHash'));
    if(snap.val()===hash){
      _isAdmin=true;
      document.getElementById('adminLogin').style.display='none';
      document.getElementById('adminPanel').style.display='block';
      errEl.textContent='';
    } else { errEl.textContent='wrong password.'; }
  } catch(e){ errEl.textContent='error: '+e.message; }
}
function logout(){
  _isAdmin=false;
  document.getElementById('adminLogin').style.display='block';
  document.getElementById('adminPanel').style.display='none';
  document.getElementById('pwInput').value='';
  filterPosts();
}
window.tryLogin=tryLogin; window.logout=logout;

async function handleFileSelect(event) {
  const file=event.target.files[0]; event.target.value='';
  if(!file) return;
  if(file.size>600*1024){ alert('max 600 KB'); return; }
  const statusEl=document.getElementById('edStatus');
  const fnameEl=document.getElementById('edFileName');
  const rmBtn=document.getElementById('edRemoveImg');
  const preview=document.getElementById('edImgPreview');
  if(statusEl) statusEl.textContent='uploading…';
  const tmpUrl=URL.createObjectURL(file);
  const tmpImg=new Image(); tmpImg.src=tmpUrl;
  await new Promise(res=>{tmpImg.onload=tmpImg.onerror=res;});
  const w=tmpImg.naturalWidth, h=tmpImg.naturalHeight;
  URL.revokeObjectURL(tmpUrl);
  const sizeKB=(file.size/1024).toFixed(1);
  try {
    const fd=new FormData(); fd.append('file',file); fd.append('upload_preset','unsigned_upload');
    const res=await fetch('https://api.cloudinary.com/v1_1/dagsxkazw/image/upload',{method:'POST',body:fd});
    const data=await res.json();
    if(!data.secure_url) throw new Error('upload failed');
    _imgUrl=data.secure_url; _imgInfo={name:file.name,sizeKB,w,h};
    if(fnameEl) fnameEl.textContent=file.name;
    if(rmBtn) rmBtn.style.display='inline-block';
    if(statusEl) statusEl.textContent='image ready.';
    if(preview){
      preview.style.display='block';
      preview.innerHTML=`<img src="${data.secure_url}" alt=""><span class="ed-img-info">File: ${file.name} (${sizeKB} KB, ${w}×${h})</span>`;
    }
  } catch(err){ if(statusEl) statusEl.textContent='upload failed.'; console.error(err); }
}
window.handleFileSelect=handleFileSelect;

function removeEditorImg(){
  _imgUrl=null; _imgInfo=null;
  const fn=document.getElementById('edFileName');
  const rb=document.getElementById('edRemoveImg');
  const pv=document.getElementById('edImgPreview');
  if(fn) fn.textContent='no file';
  if(rb) rb.style.display='none';
  if(pv){ pv.style.display='none'; pv.innerHTML=''; }
}
window.removeEditorImg=removeEditorImg;

async function submitPost(){
  if(!_isAdmin) return;
  const btn=document.getElementById('submitBtn');
  const status=document.getElementById('edStatus');
  const raw=(document.getElementById('postTextarea')?.value||'').trim();
  if(!raw&&!_imgUrl){ if(status) status.textContent='write something first.'; return; }
  btn.disabled=true;
  if(status) status.textContent='posting…';
  try {
    await window._push(window._ref(window._db,'blog/posts'),{
      contentRaw: raw,
      imageSrc:   _imgUrl||null,
      imageInfo:  _imgInfo||null,
      spoilerImg: document.getElementById('edSpoilerImg')?.checked||false,
      ts: Date.now()
    });
    document.getElementById('postTextarea').value='';
    removeEditorImg();
    const si=document.getElementById('edSpoilerImg'); if(si) si.checked=false;
    if(status){ status.textContent='posted!'; setTimeout(()=>{status.textContent='';},3000); }
  } catch(e){ if(status) status.textContent='error: '+e.message; }
  btn.disabled=false;
}
window.submitPost=submitPost;

function adminSearch(){
  const q=document.getElementById('adminSearch').value.toLowerCase().trim();
  const c=document.getElementById('adminResults');
  if(!q){ c.innerHTML=''; return; }
  const m=window._allPosts.filter(p=>{
    const t=(p.contentRaw||(p.contentHtml||'').replace(/<[^>]*>/g,'')).toLowerCase();
    return t.includes(q)||fmtDate(p.ts).toLowerCase().includes(q);
  });
  if(!m.length){ c.innerHTML='<div class="no-posts" style="color:#555;padding:16px 0;">no matches.</div>'; return; }
  renderPosts(m,c,true);
}
window.adminSearch=adminSearch;

function openLb(src){ document.getElementById('lbImg').src=src; document.getElementById('lightbox').classList.add('active'); document.addEventListener('keydown',lbKey); }
function closeLb(){ document.getElementById('lightbox').classList.remove('active'); document.removeEventListener('keydown',lbKey); }
function lbKey(e){ if(e.key==='Escape') closeLb(); }
document.getElementById('lightbox').addEventListener('click',function(e){ if(e.target===this) closeLb(); });
window.closeLb=closeLb;

// ── CURSOR TRAIL ──
(function(){
  var canvas=document.getElementById('cursor-layer');
  if(!canvas||window.matchMedia&&window.matchMedia('(pointer:coarse)').matches) return;
  var ctx=canvas.getContext('2d',{alpha:true}); if(!ctx) return;
  var dpr=Math.min(window.devicePixelRatio||1,2), w=0, h=0;
  var ptr={x:innerWidth*.5,y:innerHeight*.5,px:innerWidth*.5,py:innerHeight*.5,vis:false};
  var ghosts=[], ls=0;
  function resize(){ w=innerWidth; h=innerHeight; dpr=Math.min(window.devicePixelRatio||1,2); canvas.width=Math.max(1,Math.floor(w*dpr)); canvas.height=Math.max(1,Math.floor(h*dpr)); canvas.style.width=w+'px'; canvas.style.height=h+'px'; ctx.setTransform(dpr,0,0,dpr,0,0); }
  function on(){ if(!ptr.vis){ ptr.vis=true; canvas.classList.add('active'); } }
  function off(){ ptr.vis=false; ghosts.length=0; canvas.classList.remove('active'); ctx.clearRect(0,0,w,h); }
  function sg(x,y,str,dx,dy,sp){ ghosts.push({x,y,dx,dy,life:1.1,ttl:.06+str*.03,size:8.1+str*9.4+sp,spread:sp}); if(ghosts.length>14) ghosts.shift(); }
  function mv(e){
    on(); var now=performance.now();
    ptr.px=ptr.x; ptr.py=ptr.y; ptr.x=e.clientX; ptr.y=e.clientY;
    var dx=ptr.x-ptr.px, dy=ptr.y-ptr.py, dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<1.5) return;
    var dirX=dx/dist, dirY=dy/dist, str=Math.min(1,dist/18);
    if(now-ls<6&&dist<7) return; ls=now;
    sg(ptr.x-dirX*Math.min(4,dist*.22),ptr.y-dirY*Math.min(4,dist*.22),str,dx,dy,0);
    if(dist>7)  sg(ptr.x-dirX*Math.min(7,dist*.38), ptr.y-dirY*Math.min(7,dist*.38), str*.92,dx,dy,.45);
    if(dist>11) sg(ptr.x-dirX*Math.min(10,dist*.52),ptr.y-dirY*Math.min(10,dist*.52),str*.78,dx,dy,.9);
    if(dist>16) sg(ptr.x-dirX*Math.min(13,dist*.72),ptr.y-dirY*Math.min(13,dist*.72),str*.58,dx,dy,1.35);
  }
  function dg(g){
    var a=g.life*.62, sz=g.size*g.life;
    var d=Math.sqrt(g.dx*g.dx+g.dy*g.dy)||1, dX=g.dx/d, dY=g.dy/d;
    var tl=Math.min(24,7+d*.42+g.spread*1.8), tx=g.x-dX*tl, ty=g.y-dY*tl, sw=Math.max(2.1,sz*.42);
    var tg=ctx.createLinearGradient(tx,ty,g.x,g.y);
    tg.addColorStop(0,'rgba(255,0,0,0)'); tg.addColorStop(.24,'rgba(255,0,0,'+(a*.08)+')');
    tg.addColorStop(.64,'rgba(255,0,0,'+(a*.3)+')'); tg.addColorStop(1,'rgba(255,0,0,'+(a*.96)+')');
    ctx.strokeStyle=tg; ctx.lineWidth=sw; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(g.x,g.y); ctx.stroke();
    var gl=ctx.createRadialGradient(g.x,g.y,0,g.x,g.y,Math.max(4.5,sz*.88));
    gl.addColorStop(0,'rgba(255,0,0,'+(a*.92)+')'); gl.addColorStop(.28,'rgba(255,0,0,'+(a*.18)+')');
    gl.addColorStop(.62,'rgba(255,0,0,'+(a*.06)+')'); gl.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=gl; ctx.beginPath(); ctx.arc(g.x,g.y,Math.max(4.5,sz*.88),0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,0,0,'+(a*.9)+')'; ctx.beginPath(); ctx.arc(g.x,g.y,Math.max(1.1,sz*.14),0,Math.PI*2); ctx.fill();
  }
  function draw(dt){
    ctx.clearRect(0,0,w,h); if(!ptr.vis||!ghosts.length) return;
    for(var i=ghosts.length-1;i>=0;i--){
      var g=ghosts[i]; g.life-=dt/g.ttl;
      if(g.life<=0){ ghosts.splice(i,1); continue; }
      g.x-=g.dx*.0068*g.life; g.y-=g.dy*.0068*g.life; g.dx*=.88; g.dy*=.88; dg(g);
    }
  }
  var prev=performance.now();
  function tick(){ var now=performance.now(), dt=Math.min(.032,(now-prev)/1000); prev=now; draw(dt); requestAnimationFrame(tick); }
  resize(); tick();
  window.addEventListener('resize',resize);
  window.addEventListener('mousemove',mv,{passive:true});
  window.addEventListener('mouseenter',on,{passive:true});
  window.addEventListener('mouseleave',off,{passive:true});
  window.addEventListener('mouseout',function(e){if(!e.relatedTarget)off();},{passive:true});
  window.addEventListener('blur',off);
  document.addEventListener('visibilitychange',function(){if(document.hidden)off();});
})();
</script>
